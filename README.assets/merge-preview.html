<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QK-MONEY 预览图合并</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        h1 {
            text-align: center;
            color: #1f2937;
            font-size: 32px;
            margin-bottom: 40px;
            font-weight: 700;
        }
        .main-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .pc-section {
            flex: 2;
        }
        .phone-section {
            flex: 1;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 15px;
            padding-left: 12px;
            border-left: 4px solid #667eea;
        }
        .pc-images {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .image-wrapper {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .phone-wrapper {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        .phone-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e5e7eb;
            color: #9ca3af;
            font-size: 14px;
        }
        .btn-download {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-row">
            <div class="pc-section">
                <div class="section-title">💻 PC 端</div>
                <div class="pc-images">
                    <div class="image-wrapper">
                        <img src="pc.png" alt="PC 端">
                    </div>
                    <div class="image-wrapper">
                        <img src="pc_moon.png" alt="PC 端夜间模式">
                    </div>
                </div>
            </div>
            
            <div class="phone-section">
                <div class="section-title">📱 手机端</div>
                <div class="phone-wrapper">
                    <img src="phone.png" alt="手机端">
                </div>
            </div>
        </div>
        
        <div style="text-align: center;">
            <button class="btn-download" onclick="downloadScreenshot()">📷 截图保存</button>
        </div>
        
        <div class="footer">
            QK-MONEY - VueJS 3 &amp; Element Plus Admin UI Template
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function downloadScreenshot() {
            const container = document.querySelector('.container');
            const btn = document.querySelector('.btn-download');
            btn.style.display = 'none';
            html2canvas(container, {
                scale: 2,
                backgroundColor: '#ffffff',
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                btn.style.display = '';
                const link = document.createElement('a');
                link.download = 'qk-money-preview.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
